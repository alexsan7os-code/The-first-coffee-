<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16100A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="First Coffee">
<meta name="description" content="O mundo no seu primeiro café.">

<!-- PWA Icon gerado via Canvas — compatível com iOS Safari -->

<link rel="apple-touch-icon" id="pwa-icon" href="">
<script>
(function(){
  try {
    var c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    var ctx = c.getContext('2d');
    // Background gradient
    var grad = ctx.createRadialGradient(256,160,0,256,256,380);
    grad.addColorStop(0,'#2E1A0A');
    grad.addColorStop(1,'#16100A');
    ctx.fillStyle = grad;
    // Rounded rect
    var r=100, s=512;
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(s-r,0); ctx.quadraticCurveTo(s,0,s,r);
    ctx.lineTo(s,s-r); ctx.quadraticCurveTo(s,s,s-r,s);
    ctx.lineTo(r,s); ctx.quadraticCurveTo(0,s,0,s-r);
    ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath(); ctx.fill();
    // Subtle gold ring
    ctx.strokeStyle='rgba(200,146,26,0.3)';
    ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(256,220,165,0,Math.PI*2); ctx.stroke();
    // Cup emoji
    ctx.font='210px serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('☕',256,220);
    // Label
    ctx.font='bold 44px Georgia,serif';
    ctx.fillStyle='#C8921A';
    ctx.textBaseline='alphabetic';
    ctx.fillText('FIRST COFFEE',256,438);
    // Apply
    document.getElementById('pwa-icon').href=c.toDataURL('image/png');
  } catch(e){}
})();
<\/script>

<title>The First Coffee</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════
   TOKENS
═══════════════════════════════════ */
:root {
  --ink:       #16100A;
  --ink2:      #1E1510;
  --ink3:      #261C12;
  --parch:     #F0E6D0;
  --parch2:    #D8CEBA;
  --cream:     #B8A882;
  --gold:      #C8921A;
  --gold-dim:  rgba(200,146,26,0.15);
  --gold-line: rgba(200,146,26,0.22);
  --roast:     #7A4820;
  --muted:     #7A6A50;
  --border:    rgba(200,146,26,0.13);
  --red:       #8B2415;
  --green:     #2A5A3A;
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left,   0px);
  --safe-r: env(safe-area-inset-right,  0px);
  /* TYPE */
  --f-display: 'Merriweather', Georgia, serif;
  --f-body:    'Lora', Georgia, serif;
  --f-mono:    'IBM Plex Mono', monospace;
  /* SCALE */
  --sz-xs:  11px;
  --sz-sm:  13px;
  --sz-base:18px;
  --sz-md:  20px;
  --sz-lg:  24px;
  --sz-xl:  30px;
  --sz-2xl: 36px;
  --lh: 1.85;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { height:100%; background:var(--ink); }
body {
  min-height:100%;
  color:var(--parch);
  font-family:var(--f-body);
  font-size:var(--sz-base);
  line-height:var(--lh);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ═══════════════════════════════════
   SPLASH SCREEN
═══════════════════════════════════ */
#splash {
  position:fixed; inset:0; z-index:9999;
  background:var(--ink);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:0;
  transition:opacity 0.6s ease, transform 0.6s ease;
}

#splash.fade-out {
  opacity:0;
  transform:scale(1.04);
  pointer-events:none;
}

.splash-ring {
  position:relative; width:110px; height:110px;
  margin-bottom:32px;
}

.splash-ring-outer {
  position:absolute; inset:0;
  border:1px solid rgba(200,146,26,0.2);
  border-radius:50%;
  animation:ring-spin 8s linear infinite;
}

.splash-ring-outer::before {
  content:'';
  position:absolute; top:-3px; left:50%; transform:translateX(-50%);
  width:6px; height:6px; border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 10px var(--gold);
}

@keyframes ring-spin { to { transform:rotate(360deg); } }

.splash-cup {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:52px;
  animation:cup-float 2.5s ease-in-out infinite;
}

@keyframes cup-float {
  0%,100% { transform:translateY(0); }
  50%      { transform:translateY(-5px); }
}

.splash-title {
  font-family:var(--f-display);
  font-size:var(--sz-lg);
  font-weight:900;
  color:var(--parch);
  letter-spacing:-0.5px;
  margin-bottom:6px;
  opacity:0;
  animation:fadeUp 0.7s 0.3s forwards;
}
.splash-title em { color:var(--gold); font-style:italic; }

.splash-tagline {
  font-family:var(--f-body);
  font-size:var(--sz-base);
  font-style:italic;
  color:var(--muted);
  opacity:0;
  animation:fadeUp 0.7s 0.55s forwards;
}

.splash-bar-wrap {
  margin-top:40px;
  width:120px;
  height:2px;
  background:rgba(200,146,26,0.12);
  overflow:hidden;
  opacity:0;
  animation:fadeUp 0.5s 0.8s forwards;
}

.splash-bar {
  height:100%;
  background:var(--gold);
  width:0%;
  animation:load-bar 2.2s 0.9s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes load-bar { to { width:100%; } }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ═══════════════════════════════════
   APP SHELL
═══════════════════════════════════ */
#shell {
  display:flex; flex-direction:column;
  min-height:100dvh; max-width:540px; margin:0 auto;
  opacity:0; transition:opacity 0.5s ease;
}
#shell.visible { opacity:1; }

/* ═══════════════════════════════════
   MASTHEAD
═══════════════════════════════════ */
.masthead {
  padding:calc(var(--safe-t) + 14px) 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  flex-shrink:0; background:var(--ink);
  position:sticky; top:0; z-index:60;
}

.brand {
  font-family:var(--f-display);
  font-size:18px; font-weight:900;
  color:var(--parch); letter-spacing:-0.3px; line-height:1; white-space:nowrap;
}
.brand em { color:var(--gold); font-style:normal; }

.masthead-r { display:flex; align-items:center; gap:10px; flex-shrink:0; }

.lang-toggle { display:flex; border:1px solid var(--border); overflow:hidden; }
.lang-btn {
  background:none; border:none; color:var(--muted);
  font-family:var(--f-mono); font-size:10px; font-weight:500;
  letter-spacing:1px; padding:5px 11px; cursor:pointer;
  transition:background 0.2s, color 0.2s; white-space:nowrap;
}
.lang-btn.on { background:var(--gold); color:var(--ink); font-weight:700; }

.hdr-date {
  font-family:var(--f-mono); font-size:9px;
  color:var(--muted); letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap;
}

/* ═══════════════════════════════════
   NAV
═══════════════════════════════════ */
#nav {
  display:none; border-bottom:1px solid var(--border);
  background:var(--ink2); flex-shrink:0;
  overflow-x:auto; scrollbar-width:none;
}
#nav::-webkit-scrollbar { display:none; }
.nav-inner { display:flex; min-width:max-content; width:100%; }

.nav-tab {
  flex:1; min-width:64px; padding:11px 6px 10px;
  background:none; border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);
  font-family:var(--f-mono); font-size:9px; font-weight:500;
  letter-spacing:1.2px; text-transform:uppercase;
  cursor:pointer; display:flex; flex-direction:column;
  align-items:center; gap:4px;
  transition:color 0.2s, border-color 0.2s;
}
.nav-tab .ni { font-size:17px; line-height:1; }
.t-geo { color:var(--gold);   border-color:var(--gold); }
.t-btc { color:#D4A020;       border-color:#D4A020; }
.t-sci { color:#5AAA6A;       border-color:#5AAA6A; }
.t-col { color:#C08080;       border-color:#C08080; }
.t-x   { color:var(--parch);  border-color:var(--parch); }

/* ═══════════════════════════════════
   SCROLL BODY
═══════════════════════════════════ */
#body {
  flex:1; overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:28px 20px calc(var(--safe-b) + 48px);
}
#body::-webkit-scrollbar { width:3px; }
#body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ═══════════════════════════════════
   SCREEN: SETUP
═══════════════════════════════════ */
#s-setup { display:block; }

.hero { text-align:center; padding:24px 0 22px; }
.hero-cup { font-size:54px; display:block; margin-bottom:18px; animation:cup-float 3s ease-in-out infinite; }
.hero-title {
  font-family:var(--f-display);
  font-size:var(--sz-xl); font-weight:900;
  line-height:1.2; color:var(--parch); margin-bottom:12px;
}
.hero-title em { color:var(--gold); font-style:italic; }
.hero-sub {
  font-size:var(--sz-md); color:var(--muted);
  line-height:1.7; font-style:italic; margin-bottom:22px;
}
.pills { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; }
.pill {
  padding:5px 13px; border:1px solid var(--border);
  font-family:var(--f-mono); font-size:9px;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
}

/* Setup card */
.scard {
  background:var(--ink2); border:1px solid var(--border);
  padding:24px 20px; margin-top:24px; position:relative; overflow:hidden;
}
.scard::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, transparent, var(--gold), transparent); opacity:0.3;
}
.clabel {
  font-family:var(--f-mono); font-size:9px; font-weight:500;
  letter-spacing:2.5px; text-transform:uppercase;
  color:var(--gold); opacity:0.8; margin-bottom:14px;
}
.fwrap { position:relative; margin-bottom:12px; }
.field {
  width:100%; background:rgba(255,255,255,0.03);
  border:1px solid rgba(200,146,26,0.1);
  border-bottom-color:var(--border);
  color:var(--parch); font-family:var(--f-mono);
  font-size:13px; letter-spacing:0.5px;
  padding:13px 44px 13px 15px; outline:none;
  transition:border-color 0.25s, background 0.25s;
  -webkit-appearance:none; border-radius:0;
}
.field:focus { border-color:rgba(200,146,26,0.45); background:rgba(200,146,26,0.04); }
.field::placeholder { color:rgba(200,146,26,0.18); }
.eye-btn {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--muted);
  cursor:pointer; font-size:15px; padding:4px; opacity:0.5;
  transition:opacity 0.2s;
}
.eye-btn:hover { opacity:1; }
.fhint {
  font-family:var(--f-mono); font-size:10px;
  color:var(--muted); line-height:1.65; opacity:0.85;
}
.fhint a { color:var(--gold); text-decoration:none; }
.fhint a:hover { text-decoration:underline; }

.brew-btn {
  width:100%; margin-top:20px;
  background:var(--roast); color:var(--parch); border:none;
  padding:17px; font-family:var(--f-mono); font-size:11px;
  font-weight:500; letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; transition:background 0.2s, transform 0.1s; border-radius:0;
}
.brew-btn:not(:disabled):hover  { background:#8A5228; }
.brew-btn:not(:disabled):active { transform:scale(0.99); }
.brew-btn:disabled { background:rgba(255,255,255,0.04); color:var(--muted); cursor:default; opacity:0.5; }

/* Install hint card */
.install-card {
  background:rgba(200,146,26,0.05); border:1px solid rgba(200,146,26,0.18);
  padding:18px 20px; margin-top:16px;
}
.install-card-title {
  font-family:var(--f-mono); font-size:9px; font-weight:500;
  letter-spacing:2px; text-transform:uppercase; color:var(--gold);
  margin-bottom:10px; opacity:0.85;
}
.install-steps {
  font-family:var(--f-body); font-size:var(--sz-base);
  color:var(--muted); line-height:1.8;
}
.install-steps strong { color:var(--parch); }

/* ═══════════════════════════════════
   SCREEN: BREWING
═══════════════════════════════════ */
#s-brew {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; min-height:58vh; gap:22px; text-align:center;
}
.brew-anim { position:relative; width:60px; height:60px; }
.brew-ring {
  position:absolute; inset:0; border:2px solid var(--border);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin 0.9s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.brew-cup-sm {
  position:absolute; inset:0; display:flex;
  align-items:center; justify-content:center; font-size:24px;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(0.88);opacity:0.6;} }
.brew-lbl {
  font-family:var(--f-mono); font-size:11px;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted); min-height:20px;
}
.brew-dots { display:flex; gap:10px; }
.bdot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:background 0.4s,transform 0.3s; }
.bdot.done   { background:var(--gold); transform:scale(1.3); }
.bdot.active { background:var(--muted); animation:bdp 0.8s ease-in-out infinite; }
@keyframes bdp { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ═══════════════════════════════════
   SCREEN: ERROR
═══════════════════════════════════ */
#s-error {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; min-height:55vh; gap:14px; text-align:center;
}
.err-icon { font-size:44px; }
.err-title { font-family:var(--f-display); font-size:var(--sz-lg); font-weight:700; color:var(--red); }
.err-box {
  font-family:var(--f-mono); font-size:12px; color:var(--muted);
  max-width:300px; line-height:1.7; padding:14px 18px;
  border:1px solid rgba(139,36,21,0.2); background:rgba(139,36,21,0.05);
}
.back-btn {
  background:none; border:1px solid rgba(139,36,21,0.3); color:var(--red);
  padding:11px 28px; font-family:var(--f-mono); font-size:10px;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:4px;
  transition:background 0.2s;
}
.back-btn:hover { background:rgba(139,36,21,0.07); }

/* ═══════════════════════════════════
   CONTENT — shared
═══════════════════════════════════ */
#s-content { display:none; }

.pane { display:none; }
.pane.on { display:block; animation:riseIn 0.32s cubic-bezier(0.22,1,0.36,1); }
@keyframes riseIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

.sec-head {
  display:flex; align-items:flex-start; gap:13px;
  margin-bottom:26px; padding-bottom:16px; border-bottom:1px solid var(--border);
}
.sec-icon { font-size:28px; line-height:1; padding-top:4px; flex-shrink:0; }
.sec-name {
  font-family:var(--f-display); font-size:var(--sz-lg);
  font-weight:900; color:var(--gold); letter-spacing:-0.5px; line-height:1.1; margin-bottom:4px;
}
.sec-date { font-family:var(--f-mono); font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

/* News card */
.ncard { padding:24px 0; border-bottom:1px solid var(--border); }
.ncard:last-child { border-bottom:none; }
.ncard-num {
  display:inline-block; font-family:var(--f-mono); font-size:10px;
  font-weight:500; letter-spacing:2px; padding:4px 12px; margin-bottom:14px; color:var(--ink);
}
.ncard-title {
  font-family:var(--f-display); font-size:var(--sz-xl);
  font-weight:900; line-height:1.2; letter-spacing:-0.5px;
  color:var(--parch); margin-bottom:13px;
}
.ncard-body {
  font-family:var(--f-body); font-size:var(--sz-md);
  line-height:var(--lh); color:var(--parch2); margin-bottom:15px; font-weight:400;
}
.ncard-src { display:flex; align-items:center; gap:10px; }
.ncard-rule { width:18px; height:1px; flex-shrink:0; }
.ncard-src-txt { font-family:var(--f-mono); font-size:10px; color:var(--muted); letter-spacing:0.5px; }

/* ── Science topics ── */
.stopic {
  margin-bottom:28px; padding:22px 20px 20px;
  background:var(--ink2); border:1px solid var(--border);
  position:relative; overflow:hidden;
}
.stopic::before { content:''; position:absolute; top:0; left:0; bottom:0; width:3px; }
.tp-nutri::before { background:#5AAA6A; }
.tp-suppl::before { background:#4A8AAA; }
.tp-micro::before { background:#AA7A3A; }
.tp-natur::before { background:#6A8A5A; }
.tp-study::before { background:#8A6AAA; }

.stopic-tag {
  font-family:var(--f-mono); font-size:9px; font-weight:500;
  letter-spacing:2.5px; text-transform:uppercase; margin-bottom:11px; display:block;
}
.stopic-title {
  font-family:var(--f-display); font-size:var(--sz-lg);
  font-weight:700; line-height:1.25; color:var(--parch); margin-bottom:12px; letter-spacing:-0.3px;
}
.stopic-body {
  font-family:var(--f-body); font-size:var(--sz-md);
  line-height:var(--lh); color:var(--parch2); font-weight:400;
}
.stopic-src { display:flex; align-items:center; gap:8px; margin-top:14px; }

/* ── Column ── */
.col-intro {
  background:var(--ink2); border:1px solid var(--border);
  padding:20px; margin-bottom:26px; position:relative; overflow:hidden;
}
.col-intro::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(to right, #C08080, transparent);
}
.col-byline { font-family:var(--f-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#C08080; margin-bottom:8px; }
.col-intro-text { font-family:var(--f-body); font-size:var(--sz-base); font-style:italic; color:var(--cream); line-height:1.8; }

.col-sec { margin-bottom:28px; padding-bottom:28px; border-bottom:1px solid var(--border); }
.col-sec:last-child { border-bottom:none; }
.col-sec-icon { font-size:20px; margin-bottom:8px; display:block; }
.col-sec-label { font-family:var(--f-mono); font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:#C08080; margin-bottom:8px; }
.col-sec-title {
  font-family:var(--f-display); font-size:var(--sz-xl);
  font-weight:900; line-height:1.2; color:var(--parch); margin-bottom:14px; letter-spacing:-0.5px;
}
.col-body { font-family:var(--f-body); font-size:var(--sz-md); line-height:1.9; color:var(--parch2); }
.col-body p { margin-bottom:16px; }
.col-body p:last-child { margin-bottom:0; }

/* ── X Post ── */
.x-wrap { display:flex; flex-direction:column; gap:20px; }

.x-card {
  background:var(--ink2); border:1px solid var(--border);
  padding:22px 20px; position:relative; overflow:hidden;
}
.x-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right, transparent, rgba(240,230,208,0.18), transparent);
}
.x-card-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
}
.x-card-label {
  display:flex; align-items:center; gap:9px;
  font-family:var(--f-mono); font-size:9px; letter-spacing:2px;
  text-transform:uppercase; color:var(--muted); font-weight:500;
}
.x-card-actions { display:flex; align-items:center; gap:10px; }
.x-count { font-family:var(--f-mono); font-size:11px; color:var(--muted); }
.x-count.warn { color:var(--red); }
.copy-btn {
  background:none; border:1px solid var(--border); color:var(--muted);
  padding:6px 16px; font-family:var(--f-mono); font-size:9px;
  letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all 0.2s;
}
.copy-btn.copied { background:var(--green); border-color:var(--green); color:#fff; }

.x-post-text {

<script>
'use strict';

/* ── i18n ── */
const TR = {
  pt: {
    tab_geo:'Geo', tab_btc:'Bitcoin', tab_sci:'Ciência', tab_col:'Visão', tab_x:'Post X',
    hero_sub:'Geopolítica · Bitcoin · Ciência\nAs notícias que mudam a sua vida.',
    p_geo:'Geopolítica', p_sci:'Ciência', p_col:'Coluna',
    key_lbl:'Chave API Anthropic',
    key_hint:'Obtenha em', key_hint2:'Salva apenas neste dispositivo.',
    brew_lbl:'Preparar Edição de Hoje',
    err_t:'Algo deu errado', err_back:'← Voltar',
    sec_geo:'Geopolítica', sec_sci:'Ciência & Saúde', sec_col:'A Minha Visão',
    install_title:'Adicionar à Tela Inicial',
    install_steps:'1. Toque em <strong>⬆ Compartilhar</strong> no Safari<br>2. Escolha <strong>"Adicionar à Tela Inicial"</strong><br>3. Confirme com <strong>Adicionar</strong><br>4. O ícone ☕ aparece na sua tela — toque para abrir.',
    ios_close:'Fechar',
    x_post_lbl:'Post para X', copy_lbl:'Copiar',
    x_tip_t:'Dica de publicação',
    x_tip_b:'Este post foi escrito com até 500 caracteres, ideal para o X Premium. Cole directamente no X e publique.',
    refresh_lbl:'↺  Nova edição',
    brew_steps:['Pesquisando Geopolítica…','Pesquisando Bitcoin…','Preparando Ciência & Saúde…','Escrevendo coluna editorial…','Redigindo post para X…'],
    no_news:'Sem notícias disponíveis.',
    col_byline:'Coluna Editorial · A Minha Visão',
    col_intro:'Para além das manchetes — eis o que estas notícias significam para a sua vida, as suas decisões e o seu futuro.',
  },
  en: {
    tab_geo:'Geo', tab_btc:'Bitcoin', tab_sci:'Science', tab_col:'Column', tab_x:'X Post',
    hero_sub:'Geopolitics · Bitcoin · Science & Health\nThe news that shapes your life.',
    p_geo:'Geopolitics', p_sci:'Science', p_col:'Column',
    key_lbl:'Anthropic API Key',
    key_hint:'Get your key at', key_hint2:'Stored only on this device.',
    brew_lbl:"Brew Today's Edition",
    err_t:'Something went wrong', err_back:'← Back',
    sec_geo:'Geopolitics', sec_sci:'Science & Health', sec_col:'My Take',
    install_title:'Add to Home Screen',
    install_steps:'1. Tap <strong>⬆ Share</strong> in Safari<br>2. Choose <strong>"Add to Home Screen"</strong><br>3. Confirm with <strong>Add</strong><br>4. The ☕ icon appears on your screen — tap to open.',
    ios_close:'Close',
    x_post_lbl:'X Post', copy_lbl:'Copy',
    x_tip_t:'Publishing tip',
    x_tip_b:'This post is up to 500 characters — ideal for X Premium. Paste it directly into X and post.',
    refresh_lbl:'↺  New edition',
    brew_steps:['Searching Geopolitics…','Searching Bitcoin…','Preparing Science & Health…','Writing editorial column…','Crafting X post…'],
    no_news:'No news available.',
    col_byline:'Editorial Column · My Take',
    col_intro:'Beyond the headlines — here is what these stories mean for your life, your decisions, and your future.',
  }
};

let LANG = localStorage.getItem('tfc_lang') || 'pt';
function T(k) { return TR[LANG]?.[k] ?? TR.pt[k] ?? k; }

function setLang(l) {
  LANG = l; localStorage.setItem('tfc_lang', l);
  document.getElementById('btn-pt').className = 'lang-btn' + (l==='pt'?' on':'');
  document.getElementById('btn-en').className = 'lang-btn' + (l==='en'?' on':'');
  applyTr();
}

function applyTr() {
  document.querySelectorAll('[data-k]').forEach(el => {
    const v = T(el.dataset.k);
    if (v !== undefined) el.textContent = v;
  });
  document.querySelectorAll('[data-k-html]').forEach(el => {
    const v = T(el.dataset.kHtml);
    if (v !== undefined) el.innerHTML = v;
  });
  const sub = document.querySelector('.hero-sub');
  if (sub) sub.innerHTML = T('hero_sub').replace('\n','<br>');
}

/* ── Date ── */
const NOW = new Date();
const D_SHORT   = NOW.toLocaleDateString('pt-BR',  { day:'2-digit', month:'short', year:'numeric'  });
const D_LONG_PT = NOW.toLocaleDateString('pt-BR',  { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
const D_LONG_EN = NOW.toLocaleDateString('en-US',  { weekday:'long', month:'long', day:'numeric', year:'numeric' });
const D_API_PT  = NOW.toLocaleDateString('pt-BR',  { day:'2-digit', month:'long', year:'numeric' });
const D_API_EN  = NOW.toLocaleDateString('en-US',  { month:'long', day:'numeric', year:'numeric' });

document.getElementById('hdr-date').textContent = D_SHORT.toUpperCase();

function secDate() { return LANG==='en' ? D_LONG_EN : D_LONG_PT; }

/* ── Key persist ── */
const SK = 'tfc_key';
const saved = localStorage.getItem(SK)||'';
if (saved) { document.getElementById('fld-key').value = saved; document.getElementById('btn-brew').disabled = false; }

function onKey() { document.getElementById('btn-brew').disabled = document.getElementById('fld-key').value.trim().length < 20; }
function toggleEye() { const f=document.getElementById('fld-key'); f.type = f.type==='password'?'text':'password'; }

/* ── Screens ── */
function show(id) {
  ['s-setup','s-brew','s-error','s-content'].forEach(s => {
    const el = document.getElementById(s);
    const flex = s==='s-brew'||s==='s-error';
    el.style.display = s===id ? (flex?'flex':'block') : 'none';
  });
  document.getElementById('nav').style.display = id==='s-content' ? 'block' : 'none';
}
function goSetup() { show('s-setup'); }

/* ── Tabs ── */
function goTab(id) {
  const map = { geo:'t-geo', btc:'t-btc', sci:'t-sci', col:'t-col', x:'t-x' };
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.className = 'nav-tab'; if (t.dataset.t===id) t.classList.add(map[id]);
  });
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.getElementById('pane-'+id).classList.add('on');
  document.getElementById('body').scrollTo({ top:0, behavior:'smooth' });
  ['geo','btc','sci','col'].forEach(k => { const e=document.getElementById('sd-'+k); if(e) e.textContent=secDate(); });
}

/* ── Parse helpers ── */
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseNews(raw) {
  const blocks = raw.split(/---+/).map(b=>b.trim()).filter(Boolean);
  const items = blocks.map(b=>({
    title:  (b.match(/(?:TITLE|TÍTULO):\s*(.+)/)                       ||[])[1]?.trim(),
    summary:(b.match(/(?:SUMMARY|RESUMO):\s*([\s\S]+?)(?=(?:SOURCE|FONTE):|$)/)||[])[1]?.trim(),
    source: (b.match(/(?:SOURCE|FONTE):\s*(.+)/)                       ||[])[1]?.trim()||'—'
  })).filter(n=>n.title&&n.summary);
  if (!items.length && raw.length>80) return [{ title:LANG==='en'?'Summary':'Resumo', summary:raw.slice(0,600).trim(), source:'The First Coffee' }];
  return items;
}

function parseSci(raw) {
  return raw.split(/---+/).map(b=>b.trim()).filter(Boolean).map(b=>({
    tag:   (b.match(/(?:TAG|CATEGORIA):\s*(.+)/)                          ||[])[1]?.trim()||'—',
    title: (b.match(/(?:TITLE|TÍTULO):\s*(.+)/)                           ||[])[1]?.trim()||'',
    body:  (b.match(/(?:BODY|CONTEÚDO):\s*([\s\S]+?)(?=(?:SOURCE|FONTE):|$)/)||[])[1]?.trim()||'',
    source:(b.match(/(?:SOURCE|FONTE):\s*(.+)/)                           ||[])[1]?.trim()||'—'
  })).filter(n=>n.title&&n.body);
}

function parseCol(raw) {
  return raw.split(/---+/).map(b=>b.trim()).filter(Boolean).map(b=>({
    section: (b.match(/(?:SECTION|SEÇÃO|SECÇÃO):\s*(.+)/)          ||[])[1]?.trim()||'',
    headline:(b.match(/(?:HEADLINE|TÍTULO):\s*(.+)/)                ||[])[1]?.trim()||'',
    body:    (b.match(/(?:BODY|TEXTO):\s*([\s\S]+)/)                ||[])[1]?.trim()||''
  })).filter(n=>n.headline&&n.body);
}

/* ── Render ── */
const CAT_COLOR = { geo:'#8B6010', btc:'#7A5A10', sci:'#2A5A3A' };

function renderNews(cid, items, color) {
  const el = document.getElementById(cid);
  if (!items.length) { el.innerHTML=`<p style="font-family:var(--f-mono);font-size:12px;color:var(--muted);padding:16px 0">${T('no_news')}</p>`; return; }
  el.innerHTML = items.map((it,i)=>`
    <div class="ncard">
      <span class="ncard-num" style="background:${color}">${String(i+1).padStart(2,'0')}</span>
      <h2 class="ncard-title">${esc(it.title)}</h2>
      <p class="ncard-body">${esc(it.summary)}</p>
      <div class="ncard-src"><div class="ncard-rule" style="background:${color}"></div><span class="ncard-src-txt">${esc(it.source)}</span></div>
    </div>`).join('');
}

const TOPIC_MAP = {
  nutri:  { cls:'tp-nutri', color:'#5AAA6A' },
  suppl:  { cls:'tp-suppl', color:'#4A8AAA' },
  micro:  { cls:'tp-micro', color:'#AA7A3A' },
  natur:  { cls:'tp-natur', color:'#6A8A5A' },
  study:  { cls:'tp-study', color:'#8A6AAA' },
  estudo: { cls:'tp-study', color:'#8A6AAA' },
};
function topicStyle(tag) {
  const lc = tag.toLowerCase();
  for (const [k,v] of Object.entries(TOPIC_MAP)) { if (lc.includes(k)) return v; }
  return { cls:'tp-study', color:'#8A6AAA' };
}

function renderSci(items) {
  const el = document.getElementById('c-sci');
  if (!items.length) { el.innerHTML=`<p style="font-family:var(--f-mono);font-size:12px;color:var(--muted);padding:16px 0">${T('no_news')}</p>`; return; }
  el.innerHTML = items.map(it=>{
    const s=topicStyle(it.tag);
    return `
    <div class="stopic ${s.cls}">
      <span class="stopic-tag" style="color:${s.color}">${esc(it.tag)}</span>
      <div class="stopic-title">${esc(it.title)}</div>
      <div class="stopic-body">${esc(it.body)}</div>
      <div class="stopic-src ncard-src"><div class="ncard-rule" style="background:${s.color}"></div><span class="ncard-src-txt">${esc(it.source)}</span></div>
    </div>`;
  }).join('');
}

function renderCol(items) {
  const el = document.getElementById('c-col');
  if (!items.length) { el.innerHTML=`<p style="font-family:var(--f-mono);font-size:12px;color:var(--muted);padding:16px 0">${T('no_news')}</p>`; return; }
  const intro = `
    <div class="col-intro">
      <div class="col-byline">${T('col_byline')}</div>
      <div class="col-intro-text">${T('col_intro')}</div>
    </div>`;
  const secs = items.map(it=>{
    const lc=(it.section||'').toLowerCase();
    const icon = lc.includes('geo')||lc.includes('polit')?'🌍':lc.includes('btc')||lc.includes('bitcoin')||lc.includes('crypto')||lc.includes('cripto')?'₿':'🔬';
    const html = esc(it.body).split(/\n\n+/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${p}</p>`).join('');
    return `
    <div class="col-sec">
      <span class="col-sec-icon">${icon}</span>
      <div class="col-sec-label">${esc(it.section)}</div>
      <div class="col-sec-title">${esc(it.headline)}</div>
      <div class="col-body">${html}</div>
    </div>`;
  }).join('');
  el.innerHTML = intro + secs;
}

/* ── API call ── */
async function api(key, content, search) {
  const body = { model:'claude-sonnet-4-6', max_tokens:2000, messages:[{role:'user',content}] };
  if (search) body.tools = [{ type:'web_search_20250305', name:'web_search' }];
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify(body)
  });
  if (!r.ok) {
    let m = `HTTP ${r.status}`;
    try { const j=await r.json(); m=j?.error?.message||m;
      if (r.status===401) m = LANG==='en'?'Invalid API key.':'Chave API inválida. Verifique em console.anthropic.com.';
      if (r.status===429) m = LANG==='en'?'Rate limit hit. Wait a moment.':'Limite atingido. Aguarde 1 minuto.';
    } catch(_){}
    throw new Error(m);
  }
  const d = await r.json();
  return (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
}

/* ── Main flow ── */
let xText = '';

async function startBrew() {
  const key = document.getElementById('fld-key').value.trim();
  if (!key) return;
  localStorage.setItem(SK, key);
  show('s-brew');

  const dots = [0,1,2,3,4].map(i=>document.getElementById('bd-'+i));
  dots.forEach(d=>d.className='bdot');
  const steps = T('brew_steps');
  const P = prompts();

  try {
    // Step 0: Geo
    document.getElementById('brew-lbl').textContent = steps[0];
    dots[0].className='bdot active';
    const geoRaw = await api(key, P.geo, true);
    const geoItems = parseNews(geoRaw);
    renderNews('c-geo', geoItems, CAT_COLOR.geo);
    dots[0].className='bdot done';

    // Step 1: BTC
    document.getElementById('brew-lbl').textContent = steps[1];
    dots[1].className='bdot active';
    const btcRaw = await api(key, P.btc, true);
    const btcItems = parseNews(btcRaw);
    renderNews('c-btc', btcItems, CAT_COLOR.btc);
    dots[1].className='bdot done';

    // Step 2: Science
    document.getElementById('brew-lbl').textContent = steps[2];
    dots[2].className='bdot active';
    const sciRaw = await api(key, P.sci, false);
    const sciItems = parseSci(sciRaw);
    renderSci(sciItems);
    dots[2].className='bdot done';

    // Step 3: Column
    document.getElementById('brew-lbl').textContent = steps[3];
    dots[3].className='bdot active';
    const colRaw = await api(key, P.col, false);
    const colItems = parseCol(colRaw);
    renderCol(colItems);
    dots[3].className='bdot done';

    // Step 4: X post
    document.getElementById('brew-lbl').textContent = steps[4];
    dots[4].className='bdot active';
    const geoSum = geoItems.slice(0,2).map(n=>n.title).join('; ');
    const btcSum = btcItems.slice(0,2).map(n=>n.title).join('; ');
    const sciSum = sciItems.slice(0,2).map(n=>n.title).join('; ');
    xText = await api(key, P.x(geoSum,btcSum,sciSum), false);
    document.getElementById('x-body').textContent = xText;
    const cnt = document.getElementById('x-cnt');
    cnt.textContent = xText.length+'/500';
    cnt.className = 'x-count'+(xText.length>500?' warn':'');
    dots[4].className='bdot done';

    // Update section dates
    ['geo','btc','sci','col'].forEach(k=>{ const e=document.getElementById('sd-'+k); if(e) e.textContent=secDate(); });

    show('s-content');
    goTab('geo');

  } catch(err) {
    document.getElementById('err-box').textContent = err.message||'Erro desconhecido.';
    show('s-error');
  }
}

/* ── Copy X ── */
function copyX() {
  if (!xText) return;
  const btn = document.getElementById('btn-copy');
  const ok = () => {
    btn.querySelector('[data-k]').textContent = LANG==='en'?'✓ Copied':'✓ Copiado';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.querySelector('[data-k]').textContent=T('copy_lbl'); btn.classList.remove('copied'); }, 2300);
  };
  navigator.clipboard?.writeText(xText).then(ok).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=xText; ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    ok();
  });
}

/* ── iOS detect ── */
const isIOS        = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone===true;
const isSafariOnly = /safari/i.test(navigator.userAgent) && !/crios|fxios|chrome/i.test(navigator.userAgent);

if (isIOS && isSafariOnly) {
  // Show install card in setup
  const ic = document.getElementById('install-card');
  if (ic) ic.style.display = 'block';
  // Show bottom hint if not standalone, after delay
  if (!isStandalone) {
    setTimeout(()=>{ document.getElementById('ios-hint').style.display='block'; }, 8000);
  }
}

/* ── Splash → App ── */
function showApp() {
  const splash = document.getElementById('splash');
  const shell  = document.getElementById('shell');
  splash.classList.add('fade-out');
  setTimeout(()=>{
    splash.style.display='none';
    shell.classList.add('visible');
  }, 650);
}

// Wait for bar animation to finish (~3.1s total) then reveal
setTimeout(showApp, 3100);

/* ── Init ── */
setLang(LANG);
</script>
